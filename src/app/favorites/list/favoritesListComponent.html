<div class="p-8">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-12">My Favorite Cities</h1>

    <!-- Add new favorite section -->
    <div class="mb-12 flex gap-3 justify-center">
      <input
        type="text"
        placeholder="Add city to favorites"
        [value]="city()"
        (input)="city.set($any($event.target).value)"
        (keydown.enter)="addToFavorites()"
        class="px-4 py-2 rounded-xl bg-white/20 text-white placeholder-white/60 w-72 outline-none focus:ring-2 focus:ring-white/40 transition"
      />
      <button
        (click)="addToFavorites()"
        class="px-6 py-2 bg-white/20 text-white font-semibold rounded-xl hover:bg-white/30 transition"
      >
        Add
      </button>
    </div>

    <!-- Favorites list -->
    @if (favorites().length === 0) {
      <p class="text-center text-white/70 text-lg">No favorite cities yet. Search for a city on the main page and add it to your favorites!</p>
    } @else {
      <div class="space-y-3">
        @for (favorite of favorites(); track favorite) {
          <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5 flex justify-between items-center hover:bg-white/20 transition">
            <span class="text-lg font-semibold">{{ favorite }}</span>
            <div class="flex gap-3">
              <button
                (click)="viewForecast(favorite)"
                class="px-5 py-2 bg-blue-400/30 text-blue-100 font-semibold rounded-lg hover:bg-blue-400/50 transition"
              >
                View
              </button>
              <button
                (click)="removeFromFavorites(favorite)"
                class="px-5 py-2 bg-red-500/50 text-red-200 font-semibold rounded-lg hover:bg-red-500/70 transition"
              >
                Remove
              </button>
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
